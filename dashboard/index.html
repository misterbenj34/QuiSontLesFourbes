<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qui Sont Les Fourbes ?</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f8f9fa;
        color: #212529;
      }
      h1 {
        text-align: center;
        margin-bottom: 5px;
      }
      p.subtitle {
        text-align: center;
        color: #6c757d;
        margin-bottom: 20px;
      }
      .chart-container {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto 40px auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }
      .controls {
        text-align: center;
        margin-bottom: 20px;
      }
      button {
        padding: 8px 16px;
        margin: 0 5px;
        cursor: pointer;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
      }
      button:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <h1>Qui Sont Les Fourbes ? ⛽</h1>
    <p class="subtitle">Analyse comparative des prix à la pompe vs. prix du baril (en €/L)</p>
    
    <div class="controls">
      <label for="fuel-selector"><b>Carburant :</b> </label>
      <select id="fuel-selector" style="padding: 5px; font-size: 16px; margin-right: 15px;">
        <option value="gazole_moy" selected>Gazole</option>
        <option value="sp95_moy">SP95</option>
      </select>

      <label for="view-selector"><b>Affichage :</b> </label>
      <select id="view-selector" style="padding: 5px; font-size: 16px;">
        <option value="absolute" selected>Prix réels (€/L)</option>
        <option value="base100">Évolution (Base 100)</option>
      </select>
    </div>

    <div class="chart-container" style="position: relative; height: 65vh; min-height: 450px;">
      <canvas id="priceChart"></canvas>
    </div>

    <div id="footer-info" style="text-align: center; margin-top: 10px; font-size: 0.9em; color: #6c757d;">
      Données mises à jour le : <b><span id="last-update">Chargement...</span></b>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
